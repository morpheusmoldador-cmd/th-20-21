<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SGO Pro - TH20/TH21 Sincronizado</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0f172a; --bg-card: #1e293b; --primary: #10b981;
            --secondary: #3b82f6; --warning: #f59e0b; --text-main: #f8fafc;
            --text-dim: #94a3b8; --border: #334155; --cft-color: #a855f7;
        }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; padding: 1.2rem 0; text-align: center; background: linear-gradient(to bottom, #1e293b, #0f172a); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        #tooltip { position: absolute; background: rgba(15, 23, 42, 0.95); color: white; padding: 10px; border-radius: 8px; font-size: 11px; border: 1px solid var(--primary); pointer-events: none; display: none; z-index: 1000; }
        .nav-container { width: 95%; max-width: 1300px; margin: 1rem 0; display: flex; flex-direction: column; gap: 0.8rem; }
        .menu-row { display: flex; gap: 0.4rem; flex-wrap: wrap; justify-content: center; }
        button { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-dim); padding: 0.5rem 0.9rem; cursor: pointer; border-radius: 6px; font-size: 0.7rem; font-weight: 600; transition: 0.2s; }
        button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        button.btn-special { border-color: var(--warning); color: var(--warning); }
        button.btn-special.active { background: var(--warning); color: #fff; }
        button.btn-resumo { background: #fff; color: #000; border: none; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; width: 95%; max-width: 1300px; background: var(--bg-card); padding: 1.2rem; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 1rem; }
        .input-group { display: flex; flex-direction: column; gap: 0.3rem; }
        label { font-size: 0.6rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }
        input, select { background: var(--bg-body); border: 1px solid var(--border); color: var(--text-main); padding: 0.5rem; border-radius: 4px; font-size: 0.8rem; }
        .container-quilometros { width: 95%; max-width: 1300px; display: grid; gap: 1.5rem; padding-bottom: 50px; }
        .km-card { background: var(--bg-card); border-radius: 10px; border: 1px solid var(--border); padding: 1.2rem; }
        .km-header { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 1rem; }
        canvas { width: 100%; cursor: crosshair; }
        #tela-resumo { display: none; width: 90%; max-width: 600px; text-align: center; background: var(--bg-card); padding: 3rem; border-radius: 20px; border: 1px solid var(--border); margin: 2rem 0; }
        .sync-status { font-size: 10px; color: var(--primary); position: absolute; right: 20px; top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div id="tooltip"></div>
<div class="sync-status" id="status-cloud">☁️ Conectando...</div>

<header><h1>PAINEL DE CONTROLE DE OBRAS - TH20/TH21</h1></header>

<div class="nav-container">
    <div class="menu-row">
        <button onclick="setTab('Principal')" id="tab-Principal" class="active">Terraplanagem</button>
        <button onclick="setTab('Aterro')" id="tab-Aterro" class="btn-special">Aterro & CFT</button>
        <button onclick="setTab('Drenagem')" id="tab-Drenagem">Drenagem</button>
        <button onclick="setTab('Pavimentação')" id="tab-Pavimentação">Pavimentação</button>
        <button onclick="setTab('OAE')" id="tab-OAE">OAE</button>
        <button onclick="setTab('Sinalização')" id="tab-Sinalização">Sinalização</button>
        <button onclick="setTab('Resumo')" id="tab-Resumo" class="btn-resumo">Resumo % Global</button>
    </div>
    <div class="menu-row">
        <button onclick="setTrecho('th20')" id="btn-th20" class="active">TH-20 (KM 288-302)</button>
        <button onclick="setTrecho('th21')" id="btn-th21">TH-21 (KM 303-319)</button>
    </div>
    <div class="menu-row">
        <button onclick="setSecao('Duplicação')" id="sec-Duplicação" class="active">Duplicação</button>
        <button onclick="setSecao('Marginal Norte')" id="sec-Marginal Norte">Marginal Norte</button>
        <button onclick="setSecao('Marginal Sul')" id="sec-Marginal Sul">Marginal Sul</button>
    </div>
</div>

<div id="painel-input" class="dashboard-grid">
    <div class="input-group"><label>Estaca Inicial</label><input type="number" id="est-ini"></div>
    <div class="input-group"><label>Estaca Final</label><input type="number" id="est-fim"></div>
    <div class="input-group"><label>Serviço / Camada</label><select id="sel-serv-camada"></select></div>
    <div class="input-group">
        <label>Status</label>
        <select id="sel-cor">
            <option value="#10b981">🟢 Executado este mês</option>
            <option value="#3b82f6">🔵 Executado anteriormente</option>
            <option value="#f59e0b">🟡 Em Andamento</option>
            <option value="#ffffff">⚪ Limpar</option>
        </select>
    </div>
    <button style="background:var(--primary); color:white; font-weight:bold; margin-top:auto; height:40px; border:none; border-radius:4px; cursor:pointer;" onclick="salvarDados()">Atualizar para Todos</button>
</div>

<div id="tela-graficos" class="container-quilometros"></div>

<div id="tela-resumo">
    <h2 style="margin-bottom:2rem;">Progresso Global da Obra</h2>
    <div style="width: 300px; margin: 0 auto;"><canvas id="chartPizza"></canvas></div>
    <div id="resumo-stats" style="margin-top:2rem; font-size:1.8rem; font-weight:700;"></div>
    <p style="color:var(--text-dim); margin-top: 10px;">(Soma de Executado este mês + Anteriormente)</p>
</div>

<script>
    // --- CONFIGURAÇÃO FIREBASE ---
    // Substitua os campos apiKey e appId pelos que você encontra no console do Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBm5JVG7s3GW3CR72CSxBboNQfglGLoJB0", 
        authDomain: "obras-th20-th21.firebaseapp.com",
        databaseURL: "https://obras-th20-th21-default-rtdb.firebaseio.com",
        projectId: "obras-th20-th21",
        storageBucket: "obras-th20-th21.appspot.com",
        appId: "1:215276987705:web:4c85fad756b3a3a2a174e8"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // --- VARIÁVEIS DE ESTADO ---
    let tabAtiva = 'Principal', trechoAtivo = 'th20', secaoAtiva = 'Duplicação';
    let db = { th20: {}, th21: {} };
    
    const abasConfig = {
        Principal: ["Limpeza", "Compensação Lateral", "Corte", "Aterro"],
        Aterro: ["Fundo", ...Array.from({length: 20}, (_, i) => `${i+1}ª Camada`), "1ª Camada CFT", "2ª Camada CFT", "3ª Camada CFT"],
        Drenagem: ["Escavação", "Berço", "Assentamento", "Reaterro"],
        Pavimentação: ["Sub-Leito", "Sub-Base", "Base", "Capa Asfáltica"],
        OAE: ["Fundação", "Manto/Pilares", "Vigas", "Laje"],
        Sinalização: ["Vertical", "Horizontal", "Defensas", "Tachões"]
    };

    const trechosConfig = {
        th20: { kmIni: 288, kmFim: 302, estIni: 20000, estFim: 21028 },
        th21: { kmIni: 303, kmFim: 319, estIni: 21029, estFim: 21791 }
    };

    // --- SINCRONIZAÇÃO EM TEMPO REAL ---
    function escutarNuvem() {
        database.ref('obra_v3').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                db = data;
                render();
                document.getElementById('status-cloud').innerText = "☁️ Sincronizado para Todos";
                document.getElementById('status-cloud').style.color = "var(--primary)";
            } else {
                inicializarDBLocal();
            }
        });
    }

    function inicializarDBLocal() {
        ['th20', 'th21'].forEach(th => {
            db[th] = db[th] || {};
            ["Duplicação", "Marginal Norte", "Marginal Sul"].forEach(sec => {
                db[th][sec] = db[th][sec] || {};
                Object.keys(abasConfig).forEach(aba => {
                    db[th][sec][aba] = db[th][sec][aba] || Array.from({length: abasConfig[aba].length}, () => []);
                });
            });
        });
    }

    function salvarDados() {
        const ini = parseInt(document.getElementById('est-ini').value);
        const fim = parseInt(document.getElementById('est-fim').value);
        const idx = parseInt(document.getElementById('sel-serv-camada').value);
        const cor = document.getElementById('sel-cor').value;

        if (isNaN(ini) || isNaN(fim)) return;
        document.getElementById('status-cloud').innerText = "⏳ Atualizando nuvem...";

        // Garantir estrutura antes de gravar
        if (!db[trechoAtivo][secaoAtiva][tabAtiva][idx]) db[trechoAtivo][secaoAtiva][tabAtiva][idx] = [];

        for (let i = ini; i <= fim; i++) {
            db[trechoAtivo][secaoAtiva][tabAtiva][idx][i] = cor;
            
            // Lógica Aterro -> Principal
            if (tabAtiva === 'Aterro') {
                if (!db[trechoAtivo][secaoAtiva]['Principal'][3]) db[trechoAtivo][secaoAtiva]['Principal'][3] = [];
                let camadas = db[trechoAtivo][secaoAtiva]['Aterro'];
                let temAlguma = camadas.some(c => c && c[i] && c[i] !== "#ffffff");
                let cft2 = camadas[22] ? camadas[22][i] : null;
                let final = temAlguma ? "#f59e0b" : "#ffffff";
                if (cft2 === "#10b981" || cft2 === "#3b82f6") final = "#10b981";
                db[trechoAtivo][secaoAtiva]['Principal'][3][i] = final;
            }
        }
        // Envia o objeto modificado para o Firebase
        database.ref('obra_v3').set(db);
    }

    // --- UI E RENDERIZAÇÃO ---
    function setTab(t) { tabAtiva = t; atualizarSelects(); render(); }
    function setTrecho(tr) { trechoAtivo = tr; render(); }
    function setSecao(sc) { secaoAtiva = sc; render(); }

    function atualizarSelects() {
        const select = document.getElementById('sel-serv-camada');
        select.innerHTML = '';
        const servicos = abasConfig[tabAtiva] || [];
        servicos.forEach((s, i) => {
            if (tabAtiva === 'Principal' && i === 3) return; 
            select.innerHTML += `<option value="${i}">${s}</option>`;
        });
    }

    function render() {
        const container = document.getElementById('tela-graficos');
        const resumo = document.getElementById('tela-resumo');
        const painel = document.getElementById('painel-input');

        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        document.getElementById(`tab-${tabAtiva}`)?.classList.add('active');
        document.getElementById(`btn-${trechoAtivo}`)?.classList.add('active');
        document.getElementById(`sec-${secaoAtiva}`)?.classList.add('active');

        if (tabAtiva === 'Resumo') {
            container.style.display = 'none'; painel.style.display = 'none'; resumo.style.display = 'block';
            gerarResumo(); return;
        }

        container.style.display = 'grid'; painel.style.display = 'grid'; resumo.style.display = 'none';
        container.innerHTML = '';
        const config = trechosConfig[trechoAtivo];
        for (let km = config.kmIni; km <= config.kmFim; km++) {
            const estMin = config.estIni + ((km - config.kmIni) * 50);
            const estMax = Math.min(estMin + 49, config.estFim);
            const card = document.createElement('div');
            card.className = 'km-card';
            card.innerHTML = `<div class="km-header"><span>KM ${km}</span><span>${tabAtiva.toUpperCase()}</span><span>EST. ${estMin}-${estMax}</span></div><canvas id="canvas-km-${km}"></canvas>`;
            container.appendChild(card);
            desenharKM(km, estMin, estMax);
        }
    }

    function desenharKM(km, estMin, estMax) {
        const canvas = document.getElementById(`canvas-km-${km}`);
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const lista = abasConfig[tabAtiva];
        canvas.width = 1200; canvas.height = tabAtiva === 'Aterro' ? 550 : 250;
        const mEsq = 200, mTopo = 30, areaW = canvas.width - mEsq - 50;
        const rowH = (canvas.height - 70) / lista.length;

        lista.forEach((label, i) => {
            const idx = tabAtiva === 'Aterro' ? (lista.length - 1 - i) : i;
            const y = mTopo + (i * rowH);
            ctx.fillStyle = label.includes("CFT") ? "#a855f7" : "#f8fafc";
            ctx.font = "bold 11px Inter";
            ctx.fillText(label, 10, y + (rowH / 1.5));
            ctx.fillStyle = "#0f172a"; ctx.fillRect(mEsq, y, areaW, rowH - 4);
            const wEst = areaW / (estMax - estMin + 1);
            for (let e = estMin; e <= estMax; e++) {
                const cor = (db[trechoAtivo][secaoAtiva][tabAtiva][idx]) ? db[trechoAtivo][secaoAtiva][tabAtiva][idx][e] : null;
                if (cor && cor !== "#ffffff") { ctx.fillStyle = cor; ctx.fillRect(mEsq + ((e - estMin) * wEst), y, Math.ceil(wEst), rowH - 4); }
            }
        });
    }

    function gerarResumo() {
        let executado = 0, total = 0;
        ['th20', 'th21'].forEach(th => {
            ["Duplicação", "Marginal Norte", "Marginal Sul"].forEach(sec => {
                Object.keys(abasConfig).forEach(aba => {
                    if (aba === 'Aterro') return; 
                    total += abasConfig[aba].length * (trechosConfig[th].estFim - trechosConfig[th].estIni + 1);
                    const srvs = db[th][sec][aba];
                    if (srvs) { srvs.forEach(srv => { if(srv) srv.forEach(c => { if(c === '#10b981' || c === '#3b82f6') executado++; })}); }
                });
            });
        });
        const p = total > 0 ? ((executado / total) * 100).toFixed(2) : 0;
        const ctx = document.getElementById('chartPizza').getContext('2d');
        if (window.pCh) window.pCh.destroy();
        window.pCh = new Chart(ctx, { type: 'doughnut', data: { labels: ['Concluído', 'Pendente'], datasets: [{ data: [executado, total - executado], backgroundColor: ['#10b981', '#1e293b'], borderColor: '#334155' }] }, options: { cutout: '80%', plugins: { legend: { display: false } } } });
        document.getElementById('resumo-stats').innerHTML = `<span style="color:var(--primary)">${p}%</span> Total Obra`;
    }

    // Iniciar sistema
    escutarNuvem();
    atualizarSelects();
</script>
</body>
</html>
