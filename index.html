<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SGO Pro - Gestão por Quilômetro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0f172a; --bg-card: #1e293b; --primary: #10b981;
            --secondary: #3b82f6; --warning: #f59e0b; --text-main: #f8fafc;
            --text-dim: #94a3b8; --border: #334155;
        }

        body {
            background-color: var(--bg-body); color: var(--text-main);
            font-family: 'Inter', sans-serif; margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        header {
            width: 100%; padding: 1.5rem 0; text-align: center;
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
        }

        #tooltip {
            position: absolute; background: rgba(15, 23, 42, 0.95);
            color: white; padding: 10px; border-radius: 8px; font-size: 12px;
            border: 1px solid var(--primary); pointer-events: none; display: none; z-index: 1000;
        }

        .nav-container { width: 90%; max-width: 1200px; margin: 2rem 0; display: flex; flex-direction: column; gap: 1rem; }
        .menu-row { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }

        button {
            background: var(--bg-card); border: 1px solid var(--border);
            color: var(--text-dim); padding: 0.6rem 1rem; cursor: pointer;
            border-radius: 8px; font-size: 0.75rem; font-weight: 600; transition: all 0.2s;
        }

        button.active { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        button.btn-special { border-color: var(--warning); color: var(--warning); }
        button.btn-special.active { background: var(--warning); color: #fff; }

        .dashboard-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem; width: 90%; max-width: 1200px; background: var(--bg-card);
            padding: 1.5rem; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 2rem;
        }

        .input-group { display: flex; flex-direction: column; gap: 0.4rem; }
        label { font-size: 0.65rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }
        input, select { background: var(--bg-body); border: 1px solid var(--border); color: var(--text-main); padding: 0.6rem; border-radius: 6px; }

        .container-quilometros {
            width: 90%; max-width: 1200px; display: grid; grid-template-columns: 1fr; gap: 2rem; padding-bottom: 50px;
        }

        .km-card {
            background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border);
            padding: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .km-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.8rem;
        }

        .km-title { font-size: 1.3rem; font-weight: 800; color: var(--primary); letter-spacing: 1px; }
        .km-range { font-size: 0.85rem; color: var(--text-dim); font-weight: 500; }

        canvas { width: 100%; height: 260px; }

        #tela-resumo {
            display: none; width: 90%; max-width: 600px; text-align: center;
            background: var(--bg-card); padding: 3rem; border-radius: 20px; border: 1px solid var(--border);
        }
    </style>
</head>
<body>

<div id="tooltip"></div>

<header>
    <h1>PAINEL DE GESTÃO: KM 288 AO 319</h1>
</header>

<div class="nav-container">
    <div class="menu-row">
        <button onclick="setTab('Principal')" id="tab-Principal" class="active">Terraplanagem</button>
        <button onclick="setTab('Aterro')" id="tab-Aterro" class="btn-special">Aba Aterro</button>
        <button onclick="setTab('Drenagem')">Drenagem</button>
        <button onclick="setTab('Resumo')" style="background:#fff; color:#000;" id="tab-Resumo">Resumo Geral %</button>
    </div>
    <div class="menu-row">
        <button onclick="setTrecho('th20')" id="btn-th20" class="active">Trecho TH-20</button>
        <button onclick="setTrecho('th21')" id="btn-th21">Trecho TH-21</button>
    </div>
    <div class="menu-row">
        <button onclick="setSecao('Duplicação')" id="sec-Duplicação" class="active">Duplicação</button>
        <button onclick="setSecao('Marginal Norte')" id="sec-Marginal Norte">Marginal Norte</button>
        <button onclick="setSecao('Marginal Sul')" id="sec-Marginal Sul">Marginal Sul</button>
    </div>
</div>

<div id="painel-input" class="dashboard-grid">
    <div class="input-group"><label>Estaca Inicial</label><input type="number" id="est-ini"></div>
    <div class="input-group"><label>Estaca Final</label><input type="number" id="est-fim"></div>
    <div class="input-group">
        <label>Serviço</label>
        <select id="sel-serv">
            <option value="0">Limpeza</option>
            <option value="1">Compensação Lateral</option>
            <option value="2">Corte</option>
            <option value="3">Aterro</option>
        </select>
    </div>
    <div class="input-group">
        <label>Status</label>
        <select id="sel-cor">
            <option value="#f59e0b">🟡 Em Andamento</option>
            <option value="#10b981">🟢 Exec. Este Mês</option>
            <option value="#3b82f6">🔵 Exec. Mês Passado</option>
            <option value="#ffffff">⚪ Limpar</option>
        </select>
    </div>
    <button style="background:var(--primary); color:white; font-weight:bold; margin-top:auto; height:45px; border:none;" onclick="salvarDados()">Lançar Informações</button>
</div>

<div id="tela-graficos" class="container-quilometros"></div>

<div id="tela-resumo">
    <h2>Resumo Consolidado</h2>
    <div style="width: 250px; margin: 0 auto;"><canvas id="chartPizza"></canvas></div>
    <div id="resumo-stats" style="margin-top:2rem; font-size:1.5rem; font-weight:700;"></div>
</div>

<script>
    let tabAtiva = 'Principal', trechoAtivo = 'th20', secaoAtiva = 'Duplicação';
    const db = { th20: {}, th21: {} };
    const servicos = ["Limpeza", "Compensação Lateral", "Corte", "Aterro"];
    
    function init() {
        ['th20', 'th21'].forEach(th => {
            // Inicializamos o banco para aceitar as estacas dos KMs 288 a 319 (Estacas 14400 a 15999)
            // e também os ranges anteriores que você usava (20000 etc)
            const secoes = ["Duplicação", "Marginal Norte", "Marginal Sul"];
            secoes.forEach(sec => { db[th][sec] = [[], [], [], []]; });
        });
        render();
    }

    function setTab(t) { tabAtiva = t; render(); }
    function setTrecho(tr) { trechoAtivo = tr; render(); }
    function setSecao(sc) { secaoAtiva = sc; render(); }

    function salvarDados() {
        const ini = parseInt(document.getElementById('est-ini').value);
        const fim = parseInt(document.getElementById('est-fim').value);
        const sIdx = parseInt(document.getElementById('sel-serv').value);
        const cor = document.getElementById('sel-cor').value;
        if(isNaN(ini) || isNaN(fim)) return;
        for (let i = ini; i <= fim; i++) db[trechoAtivo][secaoAtiva][sIdx][i] = cor;
        render();
    }

    function render() {
        const container = document.getElementById('tela-graficos');
        const resumo = document.getElementById('tela-resumo');
        const painel = document.getElementById('painel-input');

        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        if(document.getElementById(`tab-${tabAtiva}`)) document.getElementById(`tab-${tabAtiva}`).classList.add('active');
        if(tabAtiva !== 'Resumo') {
            document.getElementById(`btn-${trechoAtivo}`).classList.add('active');
            document.getElementById(`sec-${secaoAtiva}`).classList.add('active');
        }

        if(tabAtiva === 'Resumo') {
            container.style.display = 'none'; painel.style.display = 'none'; resumo.style.display = 'block';
            gerarResumo(); return;
        }

        container.style.display = 'grid'; painel.style.display = 'grid'; resumo.style.display = 'none';
        container.innerHTML = '';

        // LOOP KM 288 AO 319
        for(let km = 288; km <= 319; km++) {
            const estacaInicialKM = km * 50;
            const estacaFinalKM = (km * 50) + 49;

            const card = document.createElement('div');
            card.className = 'km-card';
            card.innerHTML = `
                <div class="km-header">
                    <span class="km-title">KM ${km}</span>
                    <span class="km-range">Estacas ${estacaInicialKM} a ${estacaFinalKM}</span>
                </div>
                <canvas id="canvas-km-${km}"></canvas>
            `;
            container.appendChild(card);
            desenharKM(km, estacaInicialKM, estacaFinalKM);
        }
    }

    function desenharKM(km, estMin, estMax) {
        const canvas = document.getElementById(`canvas-km-${km}`);
        const ctx = canvas.getContext('2d');
        canvas.width = 1100; canvas.height = 280;

        const mEsq = 220, mTopo = 50, areaW = canvas.width - mEsq - 50;
        const totalEstacasKM = 50;

        servicos.forEach((label, i) => {
            if(tabAtiva === 'Aterro' && i !== 3) return;
            const y = mTopo + (tabAtiva === 'Aterro' ? 80 : i * 50);
            
            // Calculo % do KM
            let exec = 0;
            for(let e = estMin; e <= estMax; e++) {
                const c = db[trechoAtivo][secaoAtiva][i][e];
                if(c === '#10b981' || c === '#3b82f6') exec++;
            }
            const p = ((exec/50)*100).toFixed(0);

            // Labels
            ctx.fillStyle = "#f8fafc"; ctx.font = "bold 12px Inter";
            ctx.fillText(label, 20, y + 20);
            ctx.fillStyle = "#10b981"; ctx.fillText(`${p}%`, 180, y + 20);

            // Background da trilha
            ctx.fillStyle = "#0f172a";
            ctx.fillRect(mEsq, y, areaW, 30);

            // Pintura das Estacas
            const wEst = areaW / totalEstacasKM;
            for(let e = estMin; e <= estMax; e++) {
                const cor = db[trechoAtivo][secaoAtiva][i][e];
                if(cor && cor !== "#ffffff") {
                    const x = mEsq + ((e - estMin) / totalEstacasKM) * areaW;
                    ctx.fillStyle = cor;
                    ctx.fillRect(x, y, Math.ceil(wEst), 30);
                }
            }
        });

        // Régua de Estacas (Números embaixo do gráfico)
        ctx.fillStyle = "#94a3b8"; ctx.font = "10px Inter";
        for(let e = estMin; e <= estMax; e++) {
            if(e % 5 === 0) { // Mostra número a cada 5 estacas
                const x = mEsq + ((e - estMin) / totalEstacasKM) * areaW;
                ctx.fillText(e, x - 10, canvas.height - 15);
                ctx.strokeStyle = "rgba(148, 163, 184, 0.2)";
                ctx.beginPath(); ctx.moveTo(x, mTopo); ctx.lineTo(x, canvas.height - 35); ctx.stroke();
            }
        }
    }

    function gerarResumo() {
        let ex = 0, tot = 1; // tot=1 para evitar divisão por zero inicial
        const kmTotal = (319 - 288 + 1) * 50 * 4; 
        tot = kmTotal;

        ['th20','th21'].forEach(th => {
            Object.keys(db[th]).forEach(sec => {
                db[th][sec].forEach(srv => srv.forEach(c => { if(c === '#10b981' || c === '#3b82f6') ex++; }));
            });
        });

        const p = ((ex/tot)*100).toFixed(2);
        const ctx = document.getElementById('chartPizza').getContext('2d');
        if(window.pCh) window.pCh.destroy();
        window.pCh = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Executado','Pendente'],
                datasets: [{ data:[ex, Math.max(0, tot-ex)], backgroundColor:['#10b981','#0f172a'], borderColor:'#334155'}]
            },
            options: { cutout:'80%', plugins:{ legend:{ display:false } } }
        });
        document.getElementById('resumo-stats').innerHTML = `<span style="color:var(--primary)">${p}%</span> Total Obra`;
    }

    init();
</script>
</body>
</html>
