<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Evolução de Obra | Inteligência Geotécnica</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon-green: #00ff41; --bg-black: #050505; }
        body {
            background-color: var(--bg-black);
            color: var(--neon-green);
            font-family: 'Courier New', monospace;
            padding: 20px;
            margin: 0;
        }

        /* Tooltip Style */
        #tooltip {
            position: absolute;
            background: rgba(0, 255, 65, 0.9);
            color: #000;
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
            pointer-events: none;
            display: none;
            z-index: 1000;
        }

        .menu-nav { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        
        button {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
        }

        button:hover, button.active { background: var(--neon-green); color: #000; }

        .dashboard { max-width: 1100px; margin: 0 auto; }
        
        .controles {
            background: #111;
            padding: 20px;
            border: 1px solid #333;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        input, select { background: #000; border: 1px solid #444; color: #fff; padding: 8px; }

        .resumo-container {
            display: none;
            text-align: center;
            background: #111;
            padding: 30px;
            border: 1px solid var(--neon-green);
        }

        canvas { cursor: crosshair; }
        .chart-wrapper { margin-bottom: 50px; position: relative; }
        h2, h3 { text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="tooltip"></div>

<div class="dashboard">
    <div class="menu-nav">
        <button onclick="mudarTab('obra')" id="btn-obra" class="active">Evolução da Obra</button>
        <button onclick="mudarTab('resumo')" id="btn-resumo">Gerar Resumo %</button>
    </div>

    <div id="tela-obra">
        <div class="menu-nav" style="border-bottom: 1px solid #222; padding-bottom: 10px;">
            <button onclick="setSub('th20')" id="st-th20" class="active">TH-20</button>
            <button onclick="setSub('th21')" id="st-th21">TH-21</button>
        </div>

        <div class="controles">
            <select id="sel-secao">
                <option value="Duplicação">Duplicação</option>
                <option value="Marginal Norte">Marginal Norte</option>
                <option value="Marginal Sul">Marginal Sul</option>
            </select>
            <input type="number" id="est-ini" placeholder="Estaca Inicial">
            <input type="number" id="est-fim" placeholder="Estaca Final">
