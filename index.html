<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard de Obra | Evolução e Métricas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon-green: #00ff41; --bg-black: #050505; }
        body {
            background-color: var(--bg-black);
            color: var(--neon-green);
            font-family: 'Courier New', monospace;
            padding: 20px; margin: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        #tooltip {
            position: absolute; background: rgba(0, 255, 65, 0.95);
            color: #000; padding: 8px; border-radius: 4px;
            font-size: 13px; font-weight: bold; pointer-events: none;
            display: none; z-index: 1000;
        }

        .menu-principal, .sub-menu { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        
        button {
            background: transparent; border: 1px solid var(--neon-green);
            color: var(--neon-green); padding: 8px 15px; cursor: pointer;
            text-transform: uppercase; font-weight: bold; transition: 0.3s;
        }

        button:hover, button.active { background: var(--neon-green); color: #000; }
        button.btn-resumo { border-color: #fff; color: #fff; margin-left: 20px; }
        button.btn-resumo.active { background: #fff; color: #000; }

        .controles {
            background: #111; padding: 20px; border: 1px solid #333;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px; width: 100%; max-width: 1000px; margin-bottom: 20px;
        }

        input, select { background: #000; border: 1px solid #444; color: #fff; padding: 8px; }

        .container-graficos { width: 100%; max-width: 1100px; }
        .grafico-box { margin-bottom: 60px; border-left: 2px solid var(--neon-green); padding-left: 15px; }
        
        canvas { background: #000; border: 1px solid #1a1a1a; width: 100%; cursor: crosshair; }
        
        #tela-resumo {
            display: none; width: 100%; max-width: 800px; text-align: center;
            background: #111; padding: 40px; border: 1px solid var(--neon-green);
        }

        h1 { font-size: 22px; letter-spacing: 3px; text-align: center; }
        h3 { color: #fff; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 35px; }
        .perc-label { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<div id="tooltip"></div>

<h1>SISTEMA DE EVOLUÇÃO DE OBRA</h1>

<div class="menu-principal">
    <button onclick="setMenu('Terraplanagem')" id="m-Terraplanagem" class="active">Terraplanagem</button>
    <button onclick="setMenu('Drenagem')" id="m-Drenagem">Drenagem</button>
    <button onclick="setMenu('Obras de Artes')" id="m-Obras">Obras de Artes</button>
    <button onclick="setMenu('Pavimentação')" id="m-Pavimentação">Pavimentação</button>
    <button onclick="setMenu('Sinalização')" id="m-Sinalização">Sinalização</button>
    <button onclick="abrirResumo()" class="btn-resumo" id="btn-resumo-toggle">RESUMO GERAL %</button>
</div>

<div id="sub-menu-container" class="sub-menu">
    <button onclick="setSub('th20')" id="btn-th20" class="active">th-20</button>
    <button onclick="setSub('th21')" id="btn-th21">th-21</button>
</div>

<div id="painel-input" class="controles">
    <select id="sel-secao">
        <option value="Duplicação">Duplicação</option>
        <option value="Marginal Norte">Marginal Norte</option>
        <option value="Marginal Sul">Marginal Sul</option>
    </select>
    <input type="number" id="est-ini" placeholder="Estaca Inicial">
    <input type="number" id="est-fim" placeholder="Estaca Final">
    <select id="sel-serv">
        <option value="0">Limpeza</option>
        <option value="1">Compensação Lateral</option>
        <option value="2">Corte</option>
        <option value="3">Aterro</option>
    </select>
    <select id="sel-cor">
        <option value="#ffff00">Em Andamento (Amarelo)</option>
        <option value="#00ff41">Exec. Este Mês (Verde)</option>
        <option value="#0000ff">Exec. Mês Passado (Azul)</option>
        <option value="#ffffff">Limpar / Falta Executar (Branco)</option>
    </select>
    <button onclick="salvarProgresso()">ATUALIZAR DADOS</button>
</div>

<div id="tela-graficos" class="container-graficos"></div>

<div id="tela-resumo">
    <h2>RELATÓRIO DE PROGRESSO TOTAL</h2>
    <div style="width: 350px; margin: 0 auto;"><canvas id="chartPizza"></canvas></div>
    <div id="estatisticas-texto" style="margin-top: 30px; font-size: 20px; color: #fff;"></div>
</div>

<script>
    let menuAtivo = 'Terraplanagem';
    let subAtivo = 'th20';
    let modoResumo = false;

    const configs = {
        th20: {
            "Duplicação": [ {min: 20000, max: 20737}, {min: 21000, max: 21028} ],
            "Marginal Norte": [ {min: 0, max: 101} ],
            "Marginal Sul": [ {min: 0, max: 100} ]
        },
        th21: {
            "Duplicação": [ {min: 21000, max: 21791} ],
            "Marginal Norte": [ {min: 5, max: 101} ],
            "Marginal Sul": [ {min: 0, max: 100} ]
        }
    };

    const servicosLabels = ["Limpeza", "Compensação Lateral", "Corte", "Aterro"];
    const db = { th20: {}, th21: {} };

    function initDB() {
        ['th20', 'th21'].forEach(th => {
            Object.keys(configs[th]).forEach(sec => {
                db[th][sec] = [[], [], [], []];
            });
        });
    }

    function setMenu(m) { menuAtivo = m; modoResumo = false; render(); }
    function setSub(s) { subAtivo = s; render(); }
    function abrirResumo() { modoResumo = true; render(); gerarCalculoResumo(); }

    function salvarProgresso() {
        const sec = document.getElementById('sel-secao').value;
        const ini = parseInt(document.getElementById('est-ini').value);
        const fim = parseInt(document.getElementById('est-fim').value);
        const sIdx = parseInt(document.getElementById('sel-serv').value);
        const cor = document.getElementById('sel-cor').value;
        if(isNaN(ini) || isNaN(fim)) return;
        for (let i = ini; i <= fim; i++) db[subAtivo][sec][sIdx][i] = cor;
        render();
    }

    function render() {
        const container = document.getElementById('tela-graficos');
        const telaResumo = document.getElementById('tela-resumo');
        
        document.querySelectorAll('.menu-principal button').forEach(b => b.classList.toggle('active', !modoResumo && b.innerText === menuAtivo));
        document.getElementById('btn-resumo-toggle').classList.toggle('active', modoResumo);
        document.getElementById('btn-th20').classList.toggle('active', subAtivo === 'th20');
        document.getElementById('btn-th21').classList.toggle('active', subAtivo === 'th21');

        if (modoResumo) {
            container.style.display = 'none';
            telaResumo.style.display = 'block';
            return;
        }

        container.style.display = 'block';
        telaResumo.style.display = 'none';
        container.innerHTML = '';

        if (menuAtivo === 'Terraplanagem') {
            Object.keys(configs[subAtivo]).forEach(sec => {
                const box = document.createElement('div');
                box.className = 'grafico-box';
                box.innerHTML = `<h3>${sec.toUpperCase()}</h3><canvas id="canvas-${sec}" width="1050" height="280"></canvas>`;
                container.appendChild(box);
                desenharGrafico(sec);
            });
        }
    }

    function desenharGrafico(sec) {
        const canvas = document.getElementById(`canvas-${sec}`);
        const ctx = canvas.getContext('2d');
        const ranges = configs[subAtivo][sec];
        
        const minGeral = Math.min(...ranges.map(r => r.min));
        const maxGeral = Math.max(...ranges.map(r => r.max));
        const totalEstacasRange = maxGeral - minGeral;

        const margemEsq = 250; // Aumentado para caber nome + %
        const margemTopo = 40;
        const areaUtil = canvas.width - margemEsq - 50;

        // Régua de Estacas
        ctx.fillStyle = "#888";
        ctx.font = "9px Arial";
        const passo = totalEstacasRange > 200 ? 50 : 10;
        for (let e = minGeral; e <= maxGeral; e++) {
            if (e % passo === 0 || e === minGeral || e === maxGeral) {
                const x = margemEsq + ((e - minGeral) / totalEstacasRange) * areaUtil;
                ctx.fillText(e, x - 10, margemTopo - 10);
            }
        }

        servicosLabels.forEach((label, i) => {
            const y = margemTopo + (i * 50);
            
            // Cálculo da porcentagem do serviço específico nesta seção
            let contExec = 0;
            let totalEstacasValidas = 0;
            ranges.forEach(r => {
                for(let st = r.min; st <= r.max; st++) {
                    totalEstacasValidas++;
                    const c = db[subAtivo][sec][i][st];
                    if(c === '#00ff41' || c === '#0000ff') contExec++;
                }
            });
            const percServico = ((contExec / totalEstacasValidas) * 100).toFixed(1);

            // Labels à esquerda: Serviço + %
            ctx.fillStyle = "#fff";
            ctx.font = "11px Courier New";
            ctx.fillText(label, 10, y + 20);
            ctx.fillStyle = varProp('--neon-green');
            ctx.fillText(`${percServico}%`, 200, y + 20);

            // Fundo da barra
            ctx.fillStyle = "#111";
            ctx.fillRect(margemEsq, y, areaUtil, 30);

            const larguraPixelEstaca = areaUtil / (totalEstacasRange + 1);

            // Pintura das estacas
            for (let estaca = minGeral; estaca <= maxGeral; estaca++) {
                const cor = db[subAtivo][sec][i][estaca];
                const x = margemEsq + ((estaca - minGeral) / totalEstacasRange) * areaUtil;
                
                if (cor && cor !== "#ffffff") {
                    ctx.fillStyle = cor;
                    ctx.fillRect(x, y, Math.ceil(larguraPixelEstaca) + 1, 30);
                }
            }
        });

        canvas.onmousemove = (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
            const my = (e.clientY - rect.top) * (canvas.height / rect.height);
            const tip = document.getElementById('tooltip');

            if (mx > margemEsq && mx < margemEsq + areaUtil) {
                const estacaHover = Math.round(((mx - margemEsq) / areaUtil) * totalEstacasRange + minGeral);
                const sIdx = Math.floor((my - margemTopo) / 50);
                if (sIdx >= 0 && sIdx < 4) {
                    tip.style.display = 'block';
                    tip.style.left = e.pageX + 15 + 'px';
                    tip.style.top = e.pageY + 15 + 'px';
                    tip.innerHTML = `ESTACA: ${estacaHover}<br>SERVIÇO: ${servicosLabels[sIdx]}`;
                    return;
                }
            }
            tip.style.display = 'none';
        };
    }

    function gerarCalculoResumo() {
        let d = { and: 0, executado: 0, totalGeralEstacas: 0 };
        
        ['th20', 'th21'].forEach(th => {
            Object.keys(configs[th]).forEach(sec => {
                let estacasNestaSecao = 0;
                configs[th][sec].forEach(r => {
                    estacasNestaSecao += (r.max - r.min + 1);
                });
                
                d.totalGeralEstacas += (estacasNestaSecao * 4); // 4 serviços por estaca

                db[th][sec].forEach(srv => {
                    srv.forEach(c => {
                        if (c === '#ffff00') d.and++;
                        else if (c === '#00ff41' || c === '#0000ff') d.executado++;
                    });
                });
            });
        });

        const faltante = d.totalGeralEstacas - (d.executado + d.and);
        const percFinal = ((d.executado / d.totalGeralEstacas) * 100).toFixed(2);

        const ctx = document.getElementById('chartPizza').getContext('2d');
        if (window.pCh) window.pCh.destroy();
        window.pCh = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Executado Total', 'Em Andamento', 'Faltante'],
                datasets: [{ 
                    data: [d.executado, d.and, faltante], 
                    backgroundColor: ['#00ff41', '#ffff00', '#222'], 
                    borderColor: '#000',
                    borderWidth: 2
                }]
            },
            options: { 
                plugins: { 
                    legend: { labels: { color: '#00ff41', font: { family: 'Courier New' } } } 
                },
                cutout: '70%'
            }
        });
        document.getElementById('estatisticas-texto').innerHTML = `
            PROGRESSO TOTAL DA OBRA: <span style="color:#00ff41">${percFinal}%</span><br>
            <small style="font-size: 14px; color: #888;">(Média ponderada de todos os serviços executados)</small>
        `;
    }

    function varProp(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }

    initDB();
    render();
</script>
</body>
</html>
